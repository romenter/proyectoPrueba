<!-- Card básica con padding -->
<div class="card card--padded">
  <h3 class="card__title">Título de la tarjeta</h3>
  <p class="card__desc">Descripción breve del contenido de esta tarjeta.</p>
</div>

<!-- Card con borde -->
<div class="card card--bordered card--padded">
  <h3 class="card__title">Card con borde</h3>
  <p class="card__desc">Sin sombra, solo borde.</p>
</div>

<!-- Badge verde -->
<span class="badge badge--green">✓ Paid</span>

<!-- Badge azul -->
<span class="badge badge--blue">Pending</span>

<!-- Badge amarillo -->
<span class="badge badge--yellow">Processing</span>
